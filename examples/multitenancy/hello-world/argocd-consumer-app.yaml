apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeplus-hello-world-consumer
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/PatrickBladeeman/hello-world-argocd-consumer
    targetRevision: main
    path: tenants
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
